{% extends "dashboard/base.html" %}

{% block content %}
<div class="dash-head">
  <h1>آراء الزبونات</h1>
  <a href="{% url 'dashboard_review_create' %}" class="btn-primary">إضافة رأي</a>
</div>

<table class="dash-table">
  <thead>
    <tr>
      <th>الاسم</th>
      <th>النجوم</th>
      <th>الرأي</th>
      <th>الحالة</th>
      <th>إجراءات</th>
    </tr>
  </thead>
  <tbody>
    {% for r in reviews %}
    <tr>
      <td>{{ r.name }}</td>
      <td>{{ r.stars }}/5</td>
      <td>{{ r.text|truncatechars:80 }}</td>
      <td>{% if r.is_active %}ظاهر{% else %}مخفي{% endif %}</td>
      <td>
        <a href="{% url 'dashboard_review_edit' r.id %}">تعديل</a>
        <a href="{% url 'dashboard_review_delete' r.id %}" class="danger-link">حذف</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
