{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="success-box luxury-success-box">
    <div class="success-icon-wrap">
      <div class="success-icon">✓</div>
    </div>

    <h1>شكراً على طلبك</h1>

    <p class="muted luxury-success-text">
      تم استلام طلبك بنجاح، وسيتم الاتصال بك قريبًا من طرف فريقنا
      لتأكيد الطلب ومراجعة تفاصيل التوصيل.
    </p>

    <div class="hero-actions luxury-success-actions">
      <a href="{% url 'home' %}" class="btn btn-primary">العودة إلى الرئيسية</a>
      <a href="{% url 'store' %}" class="btn btn-outline">متابعة التصفح</a>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
{% if META_PIXEL_ID %}
<script>
  fbq('track', 'Purchase', {
    content_ids: [
      {% if order.items.exists %}
        {% for item in order.items.all %}'{{ item.product.id }}'{% if not forloop.last %}, {% endif %}
        {% endfor %}
      {% else %}
        '{{ order.product.id }}'
      {% endif %}
    ],
    content_name: '{{ order.product.name|escapejs }}',
    content_type: 'product',
    value: {{ order.computed_total_dzd|default:0 }},
    currency: 'DZD',
    num_items: {{ order.total_qty|default:order.qty|default:1 }}
  });
</script>
{% endif %}
{% endblock %}
