{% load static %}

<a
  id="floatingCta"
  class="floating-cta"
  href="{% url 'store' %}"
  data-default-href="{% url 'store' %}"
  data-default-text="اطلب الآن"
  data-pending-text="اضغط للطلب"
  data-confirm-text="تأكيد الطلب"
>
  <span class="floating-cta__text">اطلب الآن</span>
</a>

<style>
  .floating-cta{
    position:fixed;
    right:22px;
    bottom:22px;
    z-index:9999;

    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:14px 18px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);

    color:#fff;
    font-weight:900;
    font-size:16px;

    background: linear-gradient(135deg, rgba(255,47,138,1), rgba(194,24,91,1));
    box-shadow: 0 18px 40px rgba(0,0,0,.28);

    transition: .2s ease;
    user-select:none;
  }

  .floating-cta.is-order-mode{
    animation: pulseSoft 1.8s infinite;
  }

  .floating-cta.is-ready{
    box-shadow: 0 22px 46px rgba(0,0,0,.32), 0 0 0 12px rgba(255,47,138,.10);
  }

  @keyframes pulseSoft{
    0%   { box-shadow: 0 16px 36px rgba(0,0,0,.26), 0 0 0 0 rgba(255,47,138,.24); }
    70%  { box-shadow: 0 16px 36px rgba(0,0,0,.26), 0 0 0 12px rgba(255,47,138,0); }
    100% { box-shadow: 0 16px 36px rgba(0,0,0,.26), 0 0 0 0 rgba(255,47,138,0); }
  }

  @media (max-width:768px){
    .floating-cta{
      right:14px;
      left:14px;
      bottom:14px;
      text-align:center;
    }
  }
</style>

<script>
(function(){
  const cta = document.getElementById('floatingCta');
  if (!cta) return;

  const textEl = cta.querySelector('.floating-cta__text');
  const defaultHref = cta.dataset.defaultHref || '/';
  const defaultText = cta.dataset.defaultText || 'اطلب الآن';
  const pendingText = cta.dataset.pendingText || 'اضغط للطلب';
  const confirmText = cta.dataset.confirmText || 'تأكيد الطلب';

  // ✅ التعديل المهم هنا
  const form = document.querySelector('form.lux-form');
  const isOrderPage = !!form;

  function setLabel(label){
    if (textEl) textEl.textContent = label;
  }

  if (!isOrderPage){
    setLabel(defaultText);
    cta.href = defaultHref;
    return;
  }

  // ✅ وضع صفحة الطلب
  cta.classList.add('is-order-mode');
  cta.href = '#';
  setLabel(pendingText);

  function isFilled(el){
    if (!el) return false;
    return (el.value || '').toString().trim().length > 0;
  }

  function isOrderReady(){
    const required = form.querySelectorAll('input[required], select[required], textarea[required]');
    for (let el of required){
      if (!isFilled(el)) return false;
    }
    return true;
  }

  function scrollToFirstMissing(){
    const required = form.querySelectorAll('input[required], select[required], textarea[required]');
    for (let el of required){
      if (!isFilled(el)){
        el.scrollIntoView({behavior:'smooth', block:'center'});
        el.focus();
        break;
      }
    }
  }

  function refreshState(){
    const ready = isOrderReady();
    setLabel(ready ? confirmText : pendingText);
    cta.classList.toggle('is-ready', ready);
  }

  form.addEventListener('input', refreshState);
  form.addEventListener('change', refreshState);

  cta.addEventListener('click', function(e){
    e.preventDefault();
    if (isOrderReady()){
      if (form.requestSubmit) form.requestSubmit();
      else form.submit();
    } else {
      refreshState();
      scrollToFirstMissing();
    }
  });

})();
</script>
